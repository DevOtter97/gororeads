# SonarCloud project configuration. La info sensible (token) NO va aqui:
# se inyecta como secret en GitHub Actions (SONAR_TOKEN).

sonar.organization=devotter97
sonar.projectKey=DevOtter97_gororeads
sonar.host.url=https://sonarcloud.io

# ─── Sources & tests ───────────────────────────────────────────────
# Codigo de aplicacion que Sonar analiza para bugs/code smells/etc.
sonar.sources=src

# Archivos de tests. Sonar los detecta y NO les aplica reglas de code smell
# pensadas para codigo de produccion (ej. "metodos demasiado largos" en specs).
sonar.tests=src,tests
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,tests/**/*

# ─── Exclusions ────────────────────────────────────────────────────
# Lo que Sonar ignora completamente (no analiza ni mide cobertura).
sonar.exclusions=\
    **/*.test.ts,\
    **/*.test.tsx,\
    **/*.spec.ts,\
    tests/**/*,\
    dist/**/*,\
    .vercel/**/*,\
    .astro/**/*,\
    public/**/*,\
    scripts/**/*,\
    coverage/**/*,\
    playwright-report/**/*,\
    src/env.d.ts

# Cobertura: archivos de los que no nos importa medir % de cobertura aunque
# Sonar los analice para code smells. Tipico: types puros sin logica.
sonar.coverage.exclusions=\
    src/domain/interfaces/**,\
    src/domain/entities/**,\
    src/**/*.astro,\
    src/config/**

# ─── Coverage ──────────────────────────────────────────────────────
# El path al lcov que produce `npm run test:coverage`.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
