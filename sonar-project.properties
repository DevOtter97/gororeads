# SonarCloud project configuration. La info sensible (token) NO va aqui:
# se inyecta como secret en GitHub Actions (SONAR_TOKEN).

sonar.organization=devotter97
sonar.projectKey=DevOtter97_gororeads
sonar.host.url=https://sonarcloud.io

# ─── Sources & tests ───────────────────────────────────────────────
# Codigo de aplicacion que Sonar analiza para bugs/code smells/etc.
sonar.sources=src

# Archivos de tests. Sonar los detecta y NO les aplica reglas de code smell
# pensadas para codigo de produccion (ej. "metodos demasiado largos" en specs).
sonar.tests=src,tests
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,tests/**/*

# ─── Exclusions ────────────────────────────────────────────────────
# Lo que Sonar ignora completamente (no analiza ni mide cobertura).
sonar.exclusions=\
    **/*.test.ts,\
    **/*.test.tsx,\
    **/*.spec.ts,\
    tests/**/*,\
    dist/**/*,\
    .vercel/**/*,\
    .astro/**/*,\
    public/**/*,\
    scripts/**/*,\
    coverage/**/*,\
    playwright-report/**/*,\
    src/env.d.ts

# Cobertura: archivos de los que no nos importa medir % de cobertura aunque
# Sonar los analice para code smells. La estrategia de testing del
# proyecto (CLAUDE.md > Testing) cubre solo utilidades puras, hooks y
# componentes presentacionales. Componentes que tocan Firestore, Storage o
# APIs externas NO se testean a proposito (requieren emulator o mocks
# pesados, fuera de scope para un tracker pequeno). Lo declaramos aqui
# para que Sonar no nos pida 80% de coverage sobre codigo que no vamos
# a cubrir, mientras seguimos midiendo lo que SI testeamos.
sonar.coverage.exclusions=\
    src/domain/interfaces/**,\
    src/domain/entities/**,\
    src/**/*.astro,\
    src/config/**,\
    src/pages/**,\
    src/layouts/**,\
    src/infrastructure/**,\
    src/components/Header.tsx,\
    src/components/auth/**,\
    src/components/home/**,\
    src/components/lists/**,\
    src/components/notifications/NotificationBell.tsx,\
    src/components/notifications/NotificationsPage.tsx,\
    src/components/profile/**,\
    src/components/readings/**,\
    src/components/social/**,\
    src/hooks/useAuth.ts,\
    src/utils/compressImage.ts

# ─── Coverage ──────────────────────────────────────────────────────
# El path al lcov que produce `npm run test:coverage`.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
